spring.application.name=Helwan
spring.datasource.url=jdbc:mysql://localhost:3306/helwanuni
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.security.oauth2.client.registration.github.client-id=Ov23li7D1AHJhhGIqJgx
spring.security.oauth2.client.registration.github.client-secret=${SECRET}
app.frontend-url=http://localhost:5173

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=864000000

teacherCode=${TEACHER_CODE}



spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

logging.level.org.hibernate.stat=ERROR
logging.level.org.springframework.boot.autoconfigure.logging=WARN




spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis